{% extends 'base.html' %} {% block content %}
<div class="flex flex-col items-center justify-center mt-12">
  <div
    class="bg-md-surfaceVariant backdrop-blur-md p-8 sm:p-10 rounded-[28px] shadow-sm text-center max-w-lg w-full"
  >
    <h2 class="text-3xl font-bold mb-4 tracking-tight">Pengaturan Tema</h2>
    <p class="mb-8 text-sm opacity-80">
      Sesuaikan warna latar belakang dan teks secara global.
    </p>

    <form method="post" class="space-y-4">
      {% csrf_token %}

      <div
        class="flex items-center justify-between bg-white/10 p-4 rounded-2xl hover:bg-white/20 transition-colors"
      >
        <label for="bg_color" class="font-medium">Warna Background</label>
        <div class="flex items-center gap-3">
          <span class="font-mono text-sm opacity-80"
            >{{ theme.bg_color|default:'#be185d' }}</span
          >
          <div
            class="relative overflow-hidden w-10 h-10 rounded-full border border-white/20 shadow-sm"
          >
            <input
              type="color"
              id="bg_color"
              name="bg_color"
              value="{{ theme.bg_color|default:'#be185d' }}"
              class="absolute -top-2 -left-2 w-16 h-16 cursor-pointer"
            />
          </div>
        </div>
      </div>

      <div
        class="flex items-center justify-between bg-white/10 p-4 rounded-2xl hover:bg-white/20 transition-colors"
      >
        <label for="text_color" class="font-medium">Warna Teks</label>
        <div class="flex items-center gap-3">
          <span class="font-mono text-sm opacity-80"
            >{{ theme.text_color|default:'#ffffff' }}</span
          >
          <div
            class="relative overflow-hidden w-10 h-10 rounded-full border border-white/20 shadow-sm"
          >
            <input
              type="color"
              id="text_color"
              name="text_color"
              value="{{ theme.text_color|default:'#ffffff' }}"
              class="absolute -top-2 -left-2 w-16 h-16 cursor-pointer"
            />
          </div>
        </div>
      </div>
      
      <div
        class="flex items-center justify-between bg-white/10 p-4 rounded-2xl hover:bg-white/20 transition-colors"
      >
        <label for="font_family" class="font-medium">Jenis Font</label>
        <div class="flex items-center gap-3">
          <select 
            name="font_family" 
            id="font_family" 
            class="border border-white/20 rounded-lg p-2 text-current outline-none focus:border-white/50 w-40 sm:w-48 text-sm font-medium opacity-90 cursor-pointer"
            style="background-color: {{ theme.bg_color|default:'#be185d' }};"
          >
            <option value="Roboto, sans-serif" {% if theme.font_family == 'Roboto, sans-serif' %}selected{% endif %}>Roboto</option>
            <option value="'Open Sans', sans-serif" {% if theme.font_family == "'Open Sans', sans-serif" %}selected{% endif %}>Open Sans</option>
            <option value="'Poppins', sans-serif" {% if theme.font_family == "'Poppins', sans-serif" %}selected{% endif %}>Poppins</option>
            <option value="'Playfair Display', serif" {% if theme.font_family == "'Playfair Display', serif" %}selected{% endif %}>Playfair Display</option>
            <option value="monospace" {% if theme.font_family == 'monospace' %}selected{% endif %}>Monospace</option>

            <option value="'Comic Sans MS', 'Comic Sans', cursive" {% if theme.font_family == "'Comic Sans MS', 'Comic Sans', cursive" %}selected{% endif %}>Comic Sans</option>
            <option value="'Segoe Print', 'Bradley Hand', cursive" {% if theme.font_family == "'Segoe Print', 'Bradley Hand', cursive" %}selected{% endif %}>Casual Handwriting</option>
            <option value="'Lucida Handwriting', 'Apple Chancery', cursive" {% if theme.font_family == "'Lucida Handwriting', 'Apple Chancery', cursive" %}selected{% endif %}>Cursive Rapih</option>
            <option value="'Brush Script MT', cursive" {% if theme.font_family == "'Brush Script MT', cursive" %}selected{% endif %}>Brush Script</option>
            <option value="'Arial Rounded MT Bold', 'Helvetica Rounded', sans-serif" {% if theme.font_family == "'Arial Rounded MT Bold', 'Helvetica Rounded', sans-serif" %}selected{% endif %}>Arial Rounded</option>

            <option value="'Mali', cursive" {% if theme.font_family == "'Mali', cursive" %}selected{% endif %}>Mali</option>
            <option value="'Caveat', cursive" {% if theme.font_family == "'Caveat', cursive" %}selected{% endif %}>Caveat</option>
            <option value="'Patrick Hand', cursive" {% if theme.font_family == "'Patrick Hand', cursive" %}selected{% endif %}>Patrick Hand</option>
            <option value="'Indie Flower', cursive" {% if theme.font_family == "'Indie Flower', cursive" %}selected{% endif %}>Indie Flower</option>
            <option value="'Amatic SC', cursive" {% if theme.font_family == "'Amatic SC', cursive" %}selected{% endif %}>Amatic SC</option>

            <option value="'Trebuchet MS', 'Lucida Grande', sans-serif" {% if theme.font_family == "'Trebuchet MS', 'Lucida Grande', sans-serif" %}selected{% endif %}>Trebuchet</option>
            <option value="'Candara', Calibri, sans-serif" {% if theme.font_family == "'Candara', Calibri, sans-serif" %}selected{% endif %}>Candara</option>
            <option value="Papyrus, fantasy" {% if theme.font_family == "Papyrus, fantasy" %}selected{% endif %}>Papyrus</option>
            <option value="'Courier New', Courier, monospace" {% if theme.font_family == "'Courier New', Courier, monospace" %}selected{% endif %}>Gaya Mesin Tik</option>
            <option value="Impact, Charcoal, sans-serif" {% if theme.font_family == "Impact, Charcoal, sans-serif" %}selected{% endif %}>Impact</option>

            <option value="'Quicksand', sans-serif" {% if theme.font_family == "'Quicksand', sans-serif" %}selected{% endif %}>Quicksand</option>
            <option value="'Fredoka', sans-serif" {% if theme.font_family == "'Fredoka', sans-serif" %}selected{% endif %}>Fredoka</option>
            <option value="'Comfortaa', cursive" {% if theme.font_family == "'Comfortaa', cursive" %}selected{% endif %}>Comfortaa</option>
            <option value="'Nunito', sans-serif" {% if theme.font_family == "'Nunito', sans-serif" %}selected{% endif %}>Nunito</option>
            <option value="'Madimi One', sans-serif" {% if theme.font_family == "'Madimi One', sans-serif" %}selected{% endif %}>Madimi</option>

            <option value="'Baloo 2', cursive" {% if theme.font_family == "'Baloo 2', cursive" %}selected{% endif %}>Baloo (Bubbly)</option>
            <option value="'Sniglet', cursive" {% if theme.font_family == "'Sniglet', cursive" %}selected{% endif %}>Sniglet (Playful)</option>
            <option value="'Chewy', cursive" {% if theme.font_family == "'Chewy', cursive" %}selected{% endif %}>Chewy (Chunky)</option>
            <option value="'Itim', cursive" {% if theme.font_family == "'Itim', cursive" %}selected{% endif %}>Itim</option>
            <option value="'Luckiest Guy', cursive" {% if theme.font_family == "'Luckiest Guy', cursive" %}selected{% endif %}>Luckiest Guy</option>

            <option value="'Pacifico', cursive" {% if theme.font_family == "'Pacifico', cursive" %}selected{% endif %}>Pacifico (Retro Cursive)</option>
            <option value="'Grand Hotel', cursive" {% if theme.font_family == "'Grand Hotel', cursive" %}selected{% endif %}>Grand Hotel</option>
            <option value="'Sriracha', cursive" {% if theme.font_family == "'Sriracha', cursive" %}selected{% endif %}>Sriracha (Spicy Pen)</option>
            <option value="'Boogaloo', cursive" {% if theme.font_family == "'Boogaloo', cursive" %}selected{% endif %}>Boogaloo (Funky)</option>
            <option value="'Cherry Swash', serif" {% if theme.font_family == "'Cherry Swash', serif" %}selected{% endif %}>Cherry Swash (Fancy)</option>
          </select>
        </div>
      </div>

      <button
        type="submit"
        class="w-full mt-6 bg-md-primary text-md-onPrimary hover:bg-opacity-90 font-medium py-3 px-6 rounded-full transition-all duration-200 shadow-sm"
      >
        Simpan Tema
      </button>
    </form>

    <div class="mt-6">
      <a
        href="{% url 'home_view' %}"
        class="font-medium opacity-80 hover:opacity-100 transition-opacity"
      >
        Batal
      </a>
    </div>
  </div>
</div>
{% endblock %}
