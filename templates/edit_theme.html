{% extends 'base.html' %} {% block content %}
<div class="flex flex-col items-center justify-center mt-12">
  <div
    class="bg-md-surfaceVariant backdrop-blur-md p-8 sm:p-10 rounded-[28px] shadow-sm text-center max-w-lg w-full"
  >
    <h2 class="text-3xl font-bold mb-4 tracking-tight">Pengaturan Tema</h2>
    <p class="mb-8 text-sm opacity-80">
      Sesuaikan warna latar belakang dan teks secara global.
    </p>

    <form method="post" class="space-y-4">
      {% csrf_token %}

      <div
        class="flex items-center justify-between bg-white/10 p-4 rounded-2xl hover:bg-white/20 transition-colors"
      >
        <label for="bg_color" class="font-medium">Warna Background</label>
        <div class="flex items-center gap-3">
          <span class="font-mono text-sm opacity-80"
            >{{ theme.bg_color|default:'#be185d' }}</span
          >
          <div
            class="relative overflow-hidden w-10 h-10 rounded-full border border-white/20 shadow-sm"
          >
            <input
              type="color"
              id="bg_color"
              name="bg_color"
              value="{{ theme.bg_color|default:'#be185d' }}"
              class="absolute -top-2 -left-2 w-16 h-16 cursor-pointer"
            />
          </div>
        </div>
      </div>

      <div
        class="flex items-center justify-between bg-white/10 p-4 rounded-2xl hover:bg-white/20 transition-colors"
      >
        <label for="text_color" class="font-medium">Warna Teks</label>
        <div class="flex items-center gap-3">
          <span class="font-mono text-sm opacity-80"
            >{{ theme.text_color|default:'#ffffff' }}</span
          >
          <div
            class="relative overflow-hidden w-10 h-10 rounded-full border border-white/20 shadow-sm"
          >
            <input
              type="color"
              id="text_color"
              name="text_color"
              value="{{ theme.text_color|default:'#ffffff' }}"
              class="absolute -top-2 -left-2 w-16 h-16 cursor-pointer"
            />
          </div>
        </div>
      </div>

      <div

              theme.font_family=""

          </select>
          <script>
            document.addEventListener("DOMContentLoaded", function () {
              const currentFont =
                "{{ theme.font_family|default:'Roboto, sans-serif'|escapejs }}";
              const selectElement = document.getElementById("font_family");

              let found = false;

              for (let i = 0; i < selectElement.options.length; i++) {
                if (selectElement.options[i].value === currentFont) {
                  selectElement.selectedIndex = i;
                  found = true;
                  break;
                }
              }

              if (!found && currentFont) {
                let cleanName = currentFont.replace(/'/g, "").split(",")[0];
                const newOption = new Option(
                  "Font Lama (" + cleanName + ")",
                  currentFont,
                  true,
                  true,
                );
                newOption.style.fontFamily = currentFont;
                selectElement.add(newOption);
              }
            });
          </script>

      <div class="flex flex-col sm:flex-row gap-4 mt-8">
        <button
          type="submit"
          name="reset"
          value="true"
          class="w-full sm:w-1/2 bg-white/10 hover:bg-white/20 text-white border border-white/20 font-medium py-3 px-6 rounded-full transition-all duration-200 shadow-sm"
          onclick="
            return confirm(
              'Apakah Anda yakin ingin mereset tema ke pengaturan awal?',
            );
          "
        >
          Reset Default
        </button>
        <button
          type="submit"
          class="w-full sm:w-1/2 bg-md-primary text-md-onPrimary hover:bg-opacity-90 font-medium py-3 px-6 rounded-full transition-all duration-200 shadow-sm"
        >
          Simpan Tema

        class="font-medium opacity-80 hover:opacity-100 transition-opacity"
