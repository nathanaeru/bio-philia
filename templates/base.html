<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bio Philia093</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com"></script>

    <script>
      const baseBgColor = "{{ theme.bg_color|default:'#be185d' }}";

      function darkenHexColor(hex, amount) {
        hex = hex.replace(/^#/, "");
        if (hex.length === 3) {
          hex = hex
            .split("")
            .map((c) => c + c)
            .join("");
        }
        let r = Math.max(0, parseInt(hex.substring(0, 2), 16) - amount);
        let g = Math.max(0, parseInt(hex.substring(2, 4), 16) - amount);
        let b = Math.max(0, parseInt(hex.substring(4, 6), 16) - amount);

        return `#${r.toString(16).padStart(2, "0")}${g.toString(16).padStart(2, "0")}${b.toString(16).padStart(2, "0")}`;
      }

      const primaryDarkColor = darkenHexColor(baseBgColor, 60);

      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ["Roboto", "sans-serif"],
            },
            colors: {
              md: {
                primary: primaryDarkColor,
                onPrimary: "#FFFFFF",
                surfaceVariant: "rgba(0, 0, 0, 0.15)",
                outline: "#79747E",
              },
            },
          },
        },
      };
    </script>
  </head>

  <body
    class="min-h-screen font-sans antialiased transition-colors duration-500"
    style="background-color: {{ theme.bg_color|default:'#be185d' }}; color: {{ theme.text_color|default:'#ffffff' }};"
  >
    <nav class="p-4 bg-transparent border-b border-white/20">
      <div class="container mx-auto flex justify-between items-center px-4">
        <h1 class="text-2xl font-bold tracking-tight">PhiLia093</h1>

        {% if user.is_authenticated %}
        <a
          href="/edit-theme/"
          class="text-sm font-medium bg-md-surfaceVariant hover:bg-black/20 px-6 py-2.5 rounded-full transition-all"
        >
          ⚙️ Ubah Tema
        </a>
        {% endif %}
      </div>
    </nav>

    <main class="container mx-auto p-4 sm:p-8">
      {% block content %} {% endblock %}
    </main>
  </body>
</html>
