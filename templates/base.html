<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bio Philia093</title>
    <link 
      href="https://fonts.googleapis.com/css2?family=Amatic+SC:wght@700&family=Baloo+2:wght@500;700&family=Boogaloo&family=Caveat:wght@700&family=Cherry+Swash:wght@700&family=Chewy&family=Comfortaa:wght@500;700&family=Fredoka:wght@500;700&family=Grand+Hotel&family=Indie+Flower&family=Itim&family=Luckiest+Guy&family=Madimi+One&family=Mali:wght@500;700&family=Nunito:wght@600;800&family=Open+Sans:wght@400;600&family=Pacifico&family=Patrick+Hand&family=Playfair+Display:wght@700&family=Poppins:wght@400;600&family=Quicksand:wght@500;700&family=Raleway:wght@400;700&family=Roboto:wght@400;700&family=Sniglet:wght@800&family=Sriracha&display=swap" 
      rel="stylesheet">
    />
    <script src="https://cdn.tailwindcss.com"></script>

    <script>
      const baseBgColor = "{{ theme.bg_color|default:'#be185d' }}";

      function darkenHexColor(hex, amount) {
        hex = hex.replace(/^#/, "");
        if (hex.length === 3) {
          hex = hex
            .split("")
            .map((c) => c + c)
            .join("");
        }
        let r = Math.max(0, parseInt(hex.substring(0, 2), 16) - amount);
        let g = Math.max(0, parseInt(hex.substring(2, 4), 16) - amount);
        let b = Math.max(0, parseInt(hex.substring(4, 6), 16) - amount);

        return `#${r.toString(16).padStart(2, "0")}${g.toString(16).padStart(2, "0")}${b.toString(16).padStart(2, "0")}`;
      }

      const primaryDarkColor = darkenHexColor(baseBgColor, 60);

      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ["Roboto", "sans-serif"],
            },
            colors: {
              md: {
                primary: primaryDarkColor,
                onPrimary: "#FFFFFF",
                surfaceVariant: "rgba(0, 0, 0, 0.15)",
                outline: "#79747E",
              },
            },
          },
        },
      };
    </script>
  </head>

  <body
    class="min-h-screen antialiased transition-colors duration-500"
    style="background-color: {{ theme.bg_color|default:'#be185d' }}; color: {{ theme.text_color|default:'#ffffff' }}; font-family: {{ theme.font_family|default:'Roboto, sans-serif' }};"
  >
    <nav class="p-4 bg-md-primary text-md-onPrimary shadow-md transition-colors duration-500">
      <div class="container mx-auto flex justify-between items-center px-4">
        <h1 class="text-2xl font-bold tracking-tight">PhiLia093</h1>

        <div class="flex items-center gap-3">
          {% if user.is_authenticated %}
        
            {% if is_group_member %}
            <a href="/edit-theme/" class="text-xs md:text-sm font-medium bg-white/10 hover:bg-white/20 px-4 py-2 rounded-full transition-all border border-white/10">
              ⚙️ Ubah Tema
            </a>
            {% endif %}

            <form method="post" action="/accounts/logout/" class="inline">
              {% csrf_token %}
              <button type="submit" class="text-xs md:text-sm font-medium bg-black/10 hover:bg-black/20 px-4 py-2 rounded-full transition-all border border-black/10">
                Logout
              </button>
            </form>
          {% endif %}
        </div>
      </div>
    </nav>

    {% if messages %}
    <div
      id="message-container"
      class="fixed top-6 left-1/2 transform -translate-x-1/2 z-50 w-full max-w-lg px-4 flex flex-col gap-3"
    >
      {% for message in messages %}
      <div
        class="message-alert flex items-center justify-between p-4 rounded-2xl shadow-lg font-medium transition-all duration-500 ease-in-out opacity-100 translate-y-0 {% if message.tags == 'error' %} bg-red-100 text-red-900 border border-red-200 {% elif message.tags == 'success' %} bg-green-100 text-green-900 border border-green-200 {% else %} bg-yellow-100 text-yellow-900 border border-yellow-200 {% endif %}"
      >
        <span class="text-sm md:text-base">{{ message }}</span>

        <button
          onclick="closeMessage(this.parentElement)"
          class="ml-4 text-2xl leading-none font-bold opacity-60 hover:opacity-100 transition-opacity focus:outline-none"
        >
          &times;
        </button>
      </div>
      {% endfor %}
    </div>

    <script>
      function closeMessage(element) {
        element.classList.remove("opacity-100", "translate-y-0");
        element.classList.add("opacity-0", "-translate-y-5");

        setTimeout(() => element.remove(), 500);
      }

      setTimeout(() => {
        const alerts = document.querySelectorAll(".message-alert");
        alerts.forEach((alert) => {
          closeMessage(alert);
        });
      }, 3000);
    </script>
    {% endif %}

    <main class="container mx-auto p-4 sm:p-8">
      {% block content %} {% endblock %}
    </main>
  </body>
</html>
