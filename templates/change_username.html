{% extends 'base.html' %}

{% block content %}
<div class="flex justify-center mt-10 px-4">
    <div class="w-full max-w-md bg-md-primary shadow-2xl p-8 rounded-[30px] border border-white/10 text-white relative overflow-hidden">
        
        <div class="absolute inset-0 bg-white/5 pointer-events-none"></div>

        <div class="relative z-10">
            <div class="text-center mb-8">
                <h2 class="text-3xl font-bold tracking-tight">Ganti Username</h2>
                <p class="text-sm opacity-70 mt-2">Username saat ini: <span class="font-bold underline">{{ user.username }}</span></p>
            </div>
            
            <form method="POST" class="space-y-6">
                {% csrf_token %}
                
                <div>
                    <label class="block text-sm font-medium mb-2 ml-1 opacity-90">Username Baru</label>
                    <input type="text" name="username" value="{{ form.username.value|default:'' }}" 
                           class="w-full px-5 py-3 rounded-full bg-black/20 border border-white/30 text-white placeholder-white/50 focus:outline-none focus:ring-2 focus:ring-white/50 transition-all"
                           placeholder="Ketik username baru...">
                    
                    {% if form.username.errors %}
                        <div class="mt-2 text-xs bg-red-500/30 text-white p-2 rounded-lg border border-red-500/20">
                            {{ form.username.errors.0 }}
                        </div>
                    {% endif %}
                </div>
                
                <div class="flex flex-col gap-3">
                    <button type="submit" class="w-full py-3 bg-white text-md-primary font-bold rounded-full hover:bg-gray-100 transition-all shadow-lg active:scale-95">
                        Simpan
                    </button>
                    
                    <a href="/" class="w-full py-3 text-center text-sm font-medium bg-black/10 hover:bg-black/20 rounded-full transition-all border border-white/10">
                        Batal
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
