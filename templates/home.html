{% extends 'base.html' %} {% block content %}
<div class="flex flex-col items-center justify-center mt-12">
  <div
    class="bg-md-surfaceVariant backdrop-blur-md p-10 rounded-[28px] shadow-sm text-center max-w-lg w-full"
  >
    <h2 class="text-3xl font-bold mb-6 tracking-tight">Biodata Kelompok</h2>

    {% if user.is_authenticated %}
    <p class="mb-8 text-xl font-medium">Halo, {{ user.username }}!</p>

    <a
      href="/edit-theme/"
      class="inline-block mb-4 w-full bg-white/20 hover:bg-white/30 text-current font-medium py-3 px-6 rounded-full transition-all duration-200 text-center"
    >
      🎨 Ganti Warna Tema
    </a>

    <form method="post" action="/accounts/logout/">
      {% csrf_token %}
      <button
        type="submit"
        class="w-full bg-md-primary text-md-onPrimary hover:bg-opacity-90 font-medium py-3 px-6 rounded-full transition-all duration-200 shadow-sm"
      >
        Logout
      </button>
    </form>

    {% else %}
    <p class="mb-8 text-lg opacity-90">
      Silakan login untuk mengubah tampilan website.
    </p>

    <a
      href="/accounts/google/login/"
      class="inline-block w-full bg-md-primary text-md-onPrimary hover:bg-opacity-90 font-medium py-3 px-6 rounded-full transition-all duration-200 shadow-sm"
    >
      Login dengan Google
    </a>
    {% endif %}
  </div>
</div>
{% endblock %}
