{% extends 'base.html' %}

{% block content %}
<div class="flex flex-col items-center justify-center mt-12">
    <div class="bg-pink-800 p-10 rounded-3xl shadow-2xl border border-purple-400 text-center max-w-lg w-full">
        <h2 class="text-4xl font-extrabold mb-6">Biodata Kelompok</h2>

        {% if user.is_authenticated %}
        <p class="mb-8 text-xl">
            Halo, <span class="font-bold text-blue-300">{{ user.username }}</span>!
        </p>

        <form method="post" action="/accounts/logout/">
            {% csrf_token %}
            <button type="submit"
                class="w-full bg-gradient-to-r from-blue-500 to-purple-600 hover:from-blue-600 hover:to-purple-700 text-white font-bold py-3 px-6 rounded-full transition-all duration-300 transform hover:scale-105 shadow-lg">
                Logout
            </button>
        </form>

        {% else %}
        <p class="mb-8 text-lg text-pink-200">
            Silakan login untuk mengubah tampilan website.
        </p>

        <a href="/accounts/google/login/"
            class="inline-block w-full bg-gradient-to-r from-purple-500 to-blue-600 hover:from-purple-600 hover:to-blue-700 text-white font-bold py-3 px-6 rounded-full transition-all duration-300 transform hover:scale-105 shadow-lg">
            Login dengan Google
        </a>
        {% endif %}
    </div>
</div>
{% endblock %}
