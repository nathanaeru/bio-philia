{% extends "base.html" %}

{% block content %}
<div class="flex flex-col items-center justify-center mt-12">
    <div class="bg-pink-800 p-10 rounded-3xl shadow-2xl border border-purple-400 text-center max-w-md w-full">
        <h2 class="text-3xl font-extrabold mb-6">Keluar</h2>

        <p class="mb-8 text-lg text-pink-200">
            Apakah Anda yakin ingin keluar dari akun ini?
        </p>

        <form method="post" action="{% url 'account_logout' %}">
            {% csrf_token %}
            <button type="submit"
                class="w-full bg-gradient-to-r from-blue-500 to-purple-600 hover:from-blue-600 hover:to-purple-700 text-white font-bold py-3 px-6 rounded-full transition-all duration-300 transform hover:scale-105 shadow-lg">
                Ya, Keluar
            </button>
        </form>
    </div>
</div>
{% endblock %}
