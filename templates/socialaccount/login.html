{% extends "base.html" %} {% block content %}
<div class="flex flex-col items-center justify-center mt-12">
  <div
    class="bg-gray-900 bg-opacity-50 backdrop-blur-md p-10 rounded-3xl shadow-2xl border border-purple-400 text-center max-w-lg w-full"
  >
    <h2 class="text-3xl font-extrabold mb-6">Konfirmasi Login</h2>

    <p class="mb-8 text-lg text-pink-200">
      Anda akan diarahkan ke Google untuk melanjutkan proses login ke
      <strong>PhiLia093</strong>.
    </p>

    <form method="post">
      {% csrf_token %}
      <button
        type="submit"
        class="w-full bg-gradient-to-r from-purple-500 to-blue-600 hover:from-purple-600 hover:to-blue-700 text-white font-bold py-3 px-6 rounded-full transition-all duration-300 transform hover:scale-105 shadow-lg"
      >
        Lanjutkan ke Google
      </button>
    </form>
  </div>
</div>
{% endblock %}
